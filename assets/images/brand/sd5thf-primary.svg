<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 210" role="img" aria-labelledby="t d">
  <title id="t">SD5thF</title><desc id="d">Spin-dependent fifth-force research and community platform</desc>
  <defs><linearGradient id="spinGold" x1="36" y1="180" x2="245" y2="194" gradientUnits="userSpaceOnUse"><stop stop-color="#F3D884"/><stop offset=".48" stop-color="#D6B458"/><stop offset="1" stop-color="#A87822"/></linearGradient></defs>
  <rect width="560" height="210" rx="12" fill="#0C2340"/>
  <!-- Four equal typographic cells, centered precisely over the four force segments. -->
  <text x="87" y="144" text-anchor="middle" fill="#F3F0E8" font-family="Arial,Helvetica,sans-serif" font-size="128" font-weight="800">S</text>
  <text x="193" y="144" text-anchor="middle" fill="#F3F0E8" font-family="Arial,Helvetica,sans-serif" font-size="128" font-weight="800">D</text>
  <text x="299" y="144" text-anchor="middle" fill="#D4AF37" font-family="Arial,Helvetica,sans-serif" font-size="128" font-weight="800">5</text>
  <text x="331" y="67" fill="#D4AF37" font-family="Arial,Helvetica,sans-serif" font-size="25" font-weight="700" letter-spacing="-1">th</text>
  <text x="405" y="144" text-anchor="middle" fill="#F3F0E8" font-family="Arial,Helvetica,sans-serif" font-size="128" font-weight="800">F</text>
  <!-- Four established interactions: gravity, electromagnetic, strong, weak. -->
  <rect x="36" y="166" width="102" height="3" rx="1.5" fill="#7A8388"/>
  <rect x="142" y="166" width="102" height="3" rx="1.5" fill="#4386B5"/>
  <rect x="248" y="166" width="102" height="3" rx="1.5" fill="#A94D48"/>
  <rect x="354" y="166" width="102" height="3" rx="1.5" fill="#756A9A"/>
  <!-- Paired spin projections make the spin-dependent distinction explicit. -->
  <path d="M40 194v-14m0 0-3.5 4m3.5-4 3.5 4M53 180v14m0 0-3.5-4m3.5 4 3.5-4" fill="none" stroke="url(#spinGold)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="68" y="194" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="700" letter-spacing="2.35"><tspan fill="url(#spinGold)">SPIN-DEPENDENT</tspan><tspan dx="12" fill="#B8C4C6">FIFTH FORCE</tspan></text>
</svg>
