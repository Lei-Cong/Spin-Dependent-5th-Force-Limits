<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">SD5thF square mark</title>
  <desc id="desc">The letters S, D, 5th and F arranged as a four-cell mark on deep royal blue</desc>
  <rect width="512" height="512" rx="64" fill="#0C2340"/>
  <path d="M256 70v174" stroke="#7A8388" stroke-width="7" stroke-linecap="round"/>
  <path d="M268 256h174" stroke="#4386B5" stroke-width="7" stroke-linecap="round"/>
  <path d="M256 268v174" stroke="#A94D48" stroke-width="7" stroke-linecap="round"/>
  <path d="M70 256h174" stroke="#756A9A" stroke-width="7" stroke-linecap="round"/>
  <g fill="#F3F0E8" font-family="Arial, Helvetica, sans-serif" font-size="154" font-weight="800" text-anchor="middle">
    <text x="156" y="218">S</text>
    <text x="356" y="218">D</text>
    <text x="356" y="409">F</text>
  </g>
  <text x="151" y="409" text-anchor="middle" fill="#D4AF37" font-family="Arial, Helvetica, sans-serif" font-size="154" font-weight="800">5</text>
  <text x="193" y="310" fill="#D4AF37" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" letter-spacing="-1">th</text>
</svg>
