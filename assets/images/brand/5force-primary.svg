<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 210" role="img" aria-labelledby="t d">
  <title id="t">5FORCE</title><desc id="d">Spin-dependent fifth-force research and community platform</desc>
  <rect width="720" height="210" rx="12" fill="#08283E"/>
  <!-- The descriptor starts on the exact left edge of FORCE, creating a stable editorial axis. -->
  <text x="174" y="46" fill="#8FAFBA" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700" letter-spacing="7">SPIN-DEPENDENT</text>
  <!-- 5 and FORCE share font, size, weight, y-position, cap height, and baseline. -->
  <text x="44" y="156" fill="#55C8CA" font-family="Arial,Helvetica,sans-serif" font-size="132" font-weight="800" letter-spacing="-5">5</text>
  <text x="151" y="156" fill="#F8FBFB" font-family="Arial,Helvetica,sans-serif" font-size="132" font-weight="800" letter-spacing="-7">FORCE</text>
  <rect x="174" y="177" width="450" height="3" rx="1.5" fill="#55C8CA"/>
  <text x="174" y="197" fill="#8FAFBA" font-family="Arial,Helvetica,sans-serif" font-size="9.5" font-weight="700" letter-spacing="3.8">RESEARCH · DATA · COMMUNITY</text>
</svg>
